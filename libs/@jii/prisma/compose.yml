name: "jii-prisma"
services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
    ports:
      - ${DEV_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "$${POSTGRES_USER}"]
      interval: 3s
      timeout: 1s
      retries: 5
  test-db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=jii-test
    ports:
      - 6509:5432
    volumes:
      - postgres_data:/var/lib/postgresql/test-data/
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready", "-U", "postgres", "-d", "$${POSTGRES_DB}"]
      interval: 3s
      timeout: 1s
      retries: 5
  offline-db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=jii-offline
    ports:
      - 6510:5432
    volumes:
      - postgres_data:/var/lib/postgresql/offline-data/
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready", "-U", "postgres", "-d", "$${POSTGRES_DB}"]
      interval: 3s
      timeout: 1s
      retries: 5

volumes:
  postgres_data:
