# Local Typesense node for offline mode and Firestore-emulator sync experiments.
# Brought up automatically by `nx offline staff`.
# Manual control: `nx offline typesense` / `nx offline-down typesense`
# To wipe the data volume: `docker compose -f libs/typesense/docker-compose.yaml down -v`

services:
  typesense:
    # Latest stable as of 2026-05. Align with the GKE cluster's image once
    # production infrastructure is finalized.
    image: typesense/typesense:30.2
    container_name: recidiviz-typesense-offline
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_API_KEY: xyz
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_ENABLE_CORS: "true"
    # Typesense only writes typesense-access.log when --log-dir is set, and once a
    # log-dir is configured the main log (typesense.log) stops going to stdout too.
    # So we point both at /var/log/typesense, enable access + search logging, and
    # tail both files to stdout so `docker compose logs` shows requests + queries.
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/log/typesense
        touch /var/log/typesense/typesense.log /var/log/typesense/typesense-access.log
        tail -n +1 -F /var/log/typesense/typesense.log /var/log/typesense/typesense-access.log &
        exec /opt/typesense-server \
          --log-dir=/var/log/typesense \
          --enable-access-logging \
          --enable-search-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
      interval: 5s
      timeout: 2s
      retries: 10

volumes:
  typesense_data:
