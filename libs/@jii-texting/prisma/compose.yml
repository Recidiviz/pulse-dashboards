name: "jii-texting-prisma"
services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jii-texting
    ports:
      - 6502:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
  test-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_DATABASES=jii-texting-test-us-id,jii-texting-test-us-tx
    ports:
      - 6503:5432
    volumes:
      - postgres_data:/var/lib/postgresql/test-data/
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh

volumes:
  postgres_data:
