# Typesense search cluster for recidiviz-dashboard-production.
settings:
  context:
    project_id: recidiviz-dashboard-production
    product: typesense
    location: us-central1
    fallback_location: us-east1

vars:
  project_id: "{{ .settings.context.project_id }}"

import:
  - ../@defaults/terraform-backend

components:
  terraform:
    apps/typesense:
      vars:
        region: "{{ .settings.context.location }}"

        # Public endpoint. DNS (A record + cert-validation CNAME) is managed outside
        # this project — see the endpoint_ip / cert_dns_authorization_record outputs.
        hostname: typesense.recidiviz.org

        operator_chart_version: 0.4.1
        typesense_image: typesense/typesense:30.2

        node_machine_type: n2-highmem-4
        data_disk_size: 50Gi

        monitoring:
          alert_email: alerts@recidiviz.org
          # Production runs tighter (lower) thresholds than staging — page sooner.
          disk_alert_ratio: 0.80
          memory_alert_ratio: 0.85
          search_latency_alert_ms: 300
          pending_writes_alert: 50

    # Idles the slow-to-provision supporting infra (regional static IP, KMS key ring +
    # crypto keys, CMEK snapshot bucket, cert-DNS authorization, snapshotter GSA + WI
    # binding, Cloud Router/NAT) in a second region so a regional cutover is a
    # single var flip (mode: standby → mode: primary) + atmos apply.
    #
    # Failover playbook: RUNBOOK.md → "Regional outages".
    apps/typesense--secondary:
      metadata:
        component: apps/typesense
      vars:
        # Standby: supporting infra only (cluster + workloads + LB + monitoring +
        # CronJobs are all count = 0 in this mode). Flip to "primary" to fail over.
        mode: standby

        region: "{{ .settings.context.fallback_location }}"

        # Same hostname as the primary stack — the standby cert DNS authorization
        # is for this domain so the cert can validate immediately on failover.
        hostname: typesense.recidiviz.org

        operator_chart_version: 0.4.1
        typesense_image: typesense/typesense:30.2

        node_machine_type: n2-highmem-4
        data_disk_size: 50Gi

        # Unused in standby (monitoring policies are count=0)
        monitoring:
          alert_email: alerts@recidiviz.org
          # Production runs tighter (lower) thresholds than staging — page sooner.
          disk_alert_ratio: 0.80
          memory_alert_ratio: 0.85
          search_latency_alert_ms: 300
          pending_writes_alert: 50

    # Firebase extension that mirrors Firestore document changes into the Typesense
    # cluster above. Lives in the same stack file so a typesense rollout (cluster
    # + sync pipeline) is a single atmos apply.
    apps/firestore-typesense-search:
      vars:
        # Unpinned — the REST API's CREATE endpoint only accepts versions in
        # PUBLISHED state. The publisher uses `-rc.X` suffixes for RCs which
        # 404 on CREATE (even though they install via the firebase CLI). With
        # no pin, the API picks the latest PUBLISHED version, which currently
        # lands us on the v2.x line. Revisit when 3.x stabilizes.
        extension_ref: typesense/firestore-typesense-search

        # Cloud Functions v2 region for the extension's triggers. Should sit close
        # to the Firestore database location; nam5 is a multi-region so any US Cloud
        # Functions region is fine — us-east1 mirrors staging.
        location: us-east1

        # Project Firestore location for recidiviz-dashboard-production. nam5 is
        # a US multi-region (not a single region) — that's why the variable is
        # `location` rather than `region`.
        firestore_database_location: nam5

        # Matches the typesense component's hostname above.
        typesense_host: typesense.recidiviz.org

        collections:
          - name: clientUpdatesV2
            fields:
              - preferredName
              - stateCode

    # Custom Cloud Function that bulk-imports the once-daily ETL'd collections
    # into Typesense. Sits alongside the extension above — the extension handles
    # realtime indexOnWrite for collections in its FIRESTORE_COLLECTION_PATHS,
    # this function handles batch sync for collections that aren't in that list.
    # See the component README for the why/how:
    # libs/atmos/components/terraform/apps/typesense-backfill/README.md
    apps/typesense-backfill:
      vars:
        # Match the Firestore's region so traffic stays local. nam5 is a US
        # multi-region — us-east1 is the closest single Cloud Functions region
        # and mirrors staging.
        region: us-east1

        firestore_database: (default)

        typesense_host: typesense.recidiviz.org

        # Same source-of-truth as the firestore-typesense-search component
        # above — both consume the schema export. Once realtime-sync vs
        # batch-sync collections need to diverge per env, switch the consumer
        # that diverges to a static list (and document why) rather than
        # filtering the !exec output here.
        collections: !exec yarn tsx ../../libs/@typesense/client/src/export-collections.ts
