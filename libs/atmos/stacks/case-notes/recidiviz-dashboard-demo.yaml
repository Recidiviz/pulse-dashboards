# Infrastructure configuration for components for the case notes app that will be deployed to demo
settings:
  context:
    project_id: recidiviz-dashboard-staging
    project_number: 626425930051
    data_platform_project_number: 984160736970
    product: case-notes-demo
    location: us-central1

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: "{{ .settings.context.location }}"
  project_number: "{{ .settings.context.project_number }}"
  data_platform_project_number: "{{ .settings.context.data_platform_project_number }}"
  data_platform_project_id: "{{ .settings.context.data_platform_project_id }}"

terraform:
  backend:
    gcs:
      bucket: recidiviz-dashboard-demo-tf-state

import:
  - ../@defaults/terraform-backend

components:
  terraform:
    apps/case-notes:
      vars:
        project_number: "{{ .settings.context.project_number }}"
        data_platform_project_number: "{{ .settings.context.data_platform_project_number }}"
        artifact_registry_repo: '{{ (atmos.Component "apps/case-notes" "recidiviz-dashboard-staging--case-notes").vars.artifact_registry_repo }}'
        artifact_registry_project_id: '{{ (atmos.Component "apps/case-notes" "recidiviz-dashboard-staging--case-notes").vars.project_id }}'
        server_env_key: env_staging_case_notes_server
        service_account_id: case-notes-demo
        server_name: case-notes-server-demo
      hooks:
        store-outputs:
          outputs:
            database_credentials: .database_credentials
            service_account_email: .service_account_email
