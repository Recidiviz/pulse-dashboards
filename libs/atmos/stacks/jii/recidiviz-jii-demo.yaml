# Infrastructure configuration for components for the JII app that will be deployed to demo
settings:
  context:
    project_id: recidiviz-jii-staging
    product: jii-demo
    location: us-central1
    secrets_filename: recidiviz-jii-staging.enc.yaml

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: "{{ .settings.context.location }}"

import:
  - ../@defaults/terraform-backend

components:
  terraform:
    apps/jii: 
      vars: 
        artifact_registry_repo: '{{ (atmos.Component "apps/jii" "recidiviz-jii-staging--jii").vars.artifact_registry_repo }}'
        artifact_registry_project_id: '{{ (atmos.Component "apps/jii" "recidiviz-jii-staging--jii").vars.project_id }}'
        server_env_filename: .env.demo
        secrets_filename: "{{ .settings.context.secrets_filename }}"
        firebase_auth_project_id: recidiviz-dashboard-staging
        sql_instance_name: jii-demo
        sql_base_secret_name: jii_demo
        server_name: jii-server-demo
        service_account_id: jii-server-demo
        migrate_db_name: jii-migrate-db-demo
        deploy_keyring_name: demo-deploy-keys
