# Infrastructure configuration for components for the JII app that will be deployed to production
settings:
  context:
    project_id: recidiviz-jii-production
    product: jii
    location: us-central1
    secrets_filename: recidiviz-jii-production.enc.yaml

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: "{{ .settings.context.location }}"

import:
  - ../@defaults/terraform-backend

components:
  terraform:
    secrets:
      vars:
        sops_file: "sops/{{ .settings.context.secrets_filename }}"
        deletion_policy: DELETE
        # this is the firebase functions service account, other backends don't need this
        accessors: ["serviceAccount:933674685667-compute@developer.gserviceaccount.com"]
    apps/jii: 
      vars: 
        artifact_registry_repo: '{{ (atmos.Component "apps/jii" "recidiviz-jii-staging--jii").vars.artifact_registry_repo }}'
        artifact_registry_project_id: '{{ (atmos.Component "apps/jii" "recidiviz-jii-staging--jii").vars.project_id }}'
        server_env_filename: .env.production
        server_env_secrets_filename: env.production.enc.yaml
        secrets_filename: "{{ .settings.context.secrets_filename }}"
        firebase_auth_project_id: recidiviz-dashboard-production

