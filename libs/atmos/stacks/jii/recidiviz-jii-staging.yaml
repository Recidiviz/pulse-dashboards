# Infrastructure configuration for components for the JII app that will be deployed to staging
settings:
  context:
    project_id: recidiviz-jii-staging
    product: jii
    location: us-central1
    secrets_filename: recidiviz-jii-staging.enc.yaml

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: "{{ .settings.context.location }}"

import:
  - ../@defaults/terraform-backend
  - ../@defaults/vendor/artifact-registry

components:
  terraform:
    secrets:
      vars:
        sops_file: "sops/{{ .settings.context.secrets_filename }}"
        deletion_policy: DELETE
        # this is the firebase functions service account, other backends don't need this
        accessors: ["serviceAccount:937048170521-compute@developer.gserviceaccount.com"]
    artifact_registry:
      vars:
        repository_id: jii
    apps/jii: 
      vars: 
        artifact_registry_repo: '{{ .settings.context.location }}-docker.pkg.dev/{{ .settings.context.project_id }}/{{ (atmos.Component "artifact_registry" .stack).outputs.artifact_name }}'
        artifact_registry_project_id: "{{ .settings.context.project_id }}"
        server_env_filename: .env.staging
        secrets_filename: "{{ .settings.context.secrets_filename }}"
        firebase_auth_project_id: recidiviz-dashboard-staging
    

