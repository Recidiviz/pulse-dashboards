# Infrastructure configuration for components for the Meeting Assistant that will be deployed to staging
settings:
  context:
    project_id: recidiviz-dashboard-staging
    project_number: 626425930051
    data_platform_project_number: 984160736970
    data_platform_project_id: recidiviz-staging
    product: meetings
    location: us-central1

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: us-central1

import:
  - ../@defaults/terraform-backend
  - ../@defaults/vendor/artifact-registry

components:
  terraform:
    artifact_registry:
      vars:
        project_id: "{{ .settings.context.project_id }}"
        location: "{{ .settings.context.location }}"
        repository_id: meetings

    apps/meetings:
      vars:
        project_number: "{{ .settings.context.project_number }}"
        data_platform_project_number: "{{ .settings.context.data_platform_project_number }}"
        data_platform_project_id: "{{ .settings.context.data_platform_project_id }}"
        artifact_registry_repo: '{{ .settings.context.location }}-docker.pkg.dev/{{ .settings.context.project_id }}/{{ (atmos.Component "artifact_registry" .stack).outputs.artifact_name }}'
        artifact_registry_project_id: "{{ .settings.context.project_id }}"
        server_env_key: env_staging_meetings_server
        migrate_db_env_key: env_staging_meetings_migrate_db
        data_import_env_key: env_staging_meetings_data_import
        meetings_bucket_cors_origins:
          - "http://localhost:19000/"
          - "https://recidiviz-meetings-stagi-21e7a.web.app/"

    postgres-bq-data-transfer:
      vars:
        location: "{{ .settings.context.location }}"
        dataset_name: meetings_dashboards_db
        destination_project_id: recidiviz-staging
        destination_service_account_email: "{{ .settings.context.data_platform_project_number }}-compute@developer.gserviceaccount.com"
        tables:
          - Meeting
          - Staff
          - Client
          - ClientsToStaff
          - Transcription
          - Utterance
        service_account_email: "{{ .settings.context.project_number }}-compute@developer.gserviceaccount.com"
        postgresql:
          host: !terraform.state cloud-sql-proxy recidiviz-dashboard-staging--shared-infra cloud_sql_proxy_ip
          # For more info on quoting YQ expressions see:
          # https://atmos.tools/core-concepts/stacks/yaml-functions/terraform.state/#using-yq-expressions-to-provide-a-default-value
          port: !terraform.state cloud-sql-proxy recidiviz-dashboard-staging--shared-infra ".ports[""meetings""]"
          username: !terraform.state apps/meetings database_credentials.username
          password: !terraform.state apps/meetings database_credentials.password
          databases:
            - us_ne
