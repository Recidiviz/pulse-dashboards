# Infrastructure configuration for components for the Meeting Assistant that will be deployed to production
settings:
  context:
    project_id: recidiviz-dashboard-production
    project_number: 13012629248
    data_platform_project_number: 688733534196
    data_platform_project_id: recidiviz-123
    product: meetings
    location: us-central1

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"
  location: "{{ .settings.context.location }}"

import:
  - ../@defaults/terraform-backend

components:
  terraform:
    apps/meetings:
      vars:
        project_number: "{{ .settings.context.project_number }}"
        data_platform_project_number: "{{ .settings.context.data_platform_project_number }}"
        data_platform_project_id: "{{ .settings.context.data_platform_project_id }}"
        artifact_registry_repo: '{{ (atmos.Component "apps/meetings" "recidiviz-dashboard-staging--meetings").vars.artifact_registry_repo }}'
        artifact_registry_project_id: '{{ (atmos.Component "apps/meetings" "recidiviz-dashboard-staging--meetings").vars.project_id }}'
        database_availability_type: REGIONAL
        database_secondary_zone: us-central1-c
        server_env_key: env_prod_meetings_server
        migrate_db_env_key: env_prod_meetings_migrate_db
        data_import_env_key: env_prod_meetings_data_import
        private_network: projects/recidiviz-dashboard-production/global/networks/default
        meetings_bucket_cors_origins:
          - "https://recidiviz-meetings.web.app/"

    postgres-bq-data-transfer:
      vars:
        location: "{{ .settings.context.location }}"
        dataset_name: meetings_dashboards_db
        destination_project_id: recidiviz-123
        destination_service_account_email: "{{ .settings.context.data_platform_project_number }}-compute@developer.gserviceaccount.com"
        tables:
          - Meeting
          - Staff
          - Client
          - ClientsToStaff
          - Transcription
          - Utterance
          - NotetakingPipelineRun
          - NotetakingAgentExecution
        service_account_email: "{{ .settings.context.project_number }}-compute@developer.gserviceaccount.com"
        postgresql:
          host: !terraform.state cloud-sql-proxy recidiviz-dashboard-production--shared-infra cloud_sql_proxy_ip
          # For more info on quoting YQ expressions see:
          # https://atmos.tools/core-concepts/stacks/yaml-functions/terraform.state/#using-yq-expressions-to-provide-a-default-value
          port: !terraform.state cloud-sql-proxy recidiviz-dashboard-production--shared-infra ".ports[""meetings""]"
          username: !terraform.state apps/meetings database_credentials.username
          password: !terraform.state apps/meetings database_credentials.password
          databases:
            - us_ne
