nodeLinker: node-modules

# 72-hour package age gate for enhanced security - ACTIVE
# Requires packages to be at least 72 hours old before installation
# This feature is now available in Yarn 4.10.3+
npmMinimalAgeGate: 4320  # 72 hours in minutes (72 * 60 = 4320)

npmPreapprovedPackages:
  - react@19.2.1
  - react-dom@19.2.1
