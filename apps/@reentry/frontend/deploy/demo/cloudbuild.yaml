steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/frontend:demo'
      - '-f'
      - 'deploy/Dockerfile.gcp'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://backend-api-demo-773019812766.us-central1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_AUTH0_DOMAIN=recidiviz-rnd.us.auth0.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_AUTH0_CLIENT_ID=RYLR4JPeS70HPxfgMx8Fs96az52S59DE'
      - '--build-arg'
      - 'NEXT_PUBLIC_AUTH0_AUDIENCE=https://recidiviz-rnd.us.auth0.com/api/v2/'
      - '--build-arg'
      - 'NEXT_PUBLIC_GA_ID=G-R8NB9XLG2P'
      - '--build-arg'
      - 'NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LcWeGYrAAAAAB03JXwaWoa41QTE81HIWuXNkdcc'
      - '--build-arg'
      - 'NEXT_PUBLIC_ENVIRONMENT=demo'
      - '--build-arg'
      - 'NEXT_PUBLIC_SENTRY_DSN=https://a45dc94f9ed89365e4e6ff30d35e2e5e@o432474.ingest.us.sentry.io/4509651407863809'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/frontend:demo']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend-demo'
      - '--image'
      - 'gcr.io/$PROJECT_ID/frontend:demo'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/frontend:demo'