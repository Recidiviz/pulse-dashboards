steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deploy/Dockerfile.force-db'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recidiviz-force-db-job:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recidiviz-force-db-job:latest'
      - '.'
    dir: 'backend'

  # Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/recidiviz-force-db-job:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/recidiviz-force-db-job:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "⏳ waiting registry propagation."
        sleep 10
        echo "✅ ready for deploy"

  # Deploy Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'replace'
      - 'backend/deploy/force-db-job/job.yaml'
      - '--region=us-central1'
options:
  logging: CLOUD_LOGGING_ONLY
