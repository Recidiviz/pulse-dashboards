Q11: # 11. (Y/N) Currently Employed
  # TODO self employed flag for verification
  # TODO test and maybe input financial stability as it's a determinig factor.
  question: |
    What is the person's occupation?
    Employed: the person has a full-time job (>=30h a week). Is they are a seasonal worker and are not in financial stress, they are considered employed
    Education: the person is full-time student
    Education and employment: The person had a job and is a student, their combined activity is full-time
    Retiree: Retired from the job market and receiving a pension/social security
    Homemaker: The person is financially stable and chooses to care for poeple as an unpaid job.
    SSD/SSI: The person receives a sufficient social security for disability to assure their financial stability.
    Part-time: The person has a part-time job that does not meet their financial needs
    Unemployed: The person is not in any of these categories
    Unclear: You do not have any information about this person's employment and/or financial stability.
Q12: # 12. (Y/N) Frequently unemployed
  question: Was the person employed less than 50% of last 12 months in the community? (Yes, No, Unclear if you do not have the necessary information)
Q13: # 13.(Y/N) Never employed for a full year
  question: Has the person NEVER held a job for a full year ? (Yes, No, Unclear if you do not have the necessary information)
Q14: # 14. (Y/N) Ever fired
  question: |
    Was the person ever fired ?
    Check Yes if the person has ever been fired, laid off, let go, or otherwise instructed not to return to work due to reasons of performance,
    if the person resigned in lieu of termination, or even received a Dishonorable Discharge, Bad Conduct Discharge,
    or Other Than Honorable Discharge from the military.
    answer Unclear if you do not have the necessary information: being currently employed does not mean they were never fired from a previous job.
Q15:
  question: |
    LESS THAN REGULAR GRADE 10?
    Check “Yes” if the person quit school before completing the 10th grade.
    Check “No” if the person has obtained a GED or HSE, even if obtained
    through correspondence or online programs.
    answer Unclear if you do not have the necessary information
Q16:
  question: |
    LESS THAN REGULAR GRADE 12?
    Check “Yes” if question 15 is “Yes”.
    Check “Yes” if the person quit school before completing the 12th grade.
    Check “No” if the person has obtained a GED or HSE, even if obtained
    through correspondence or online programs.
    answer Unclear if you do not have the necessary information
Q17:
  question: |
    SUSPENDED OR EXPELLED AT LEAST ONCE?
    Check “Yes” if the person has ever been asked to leave school, temporarily or
    permanently, for disciplinary reasons.
    Check “Yes” for in-school suspensions, unless for academic reasons in college.
    answer Unclear if you do not have the necessary information
Q18A: # Participation & Performance - Employed
  question: |
    Rate this person's participation, involvment and performance in their work
    Negative: They hate their job, or get negative feedback on a regular basis.
    Inconsistent: They dislike their job, and perform at less than adequate level, they receive verbal reward on a very inconsistent basis.
    Rewarding: They display some interest in their job, they may desire a different type of job. Performance is adequate, but they receive little appreciation.
    Positive: They express a strong interest in their job, pride in their abilities/performance. They want to stay in the same line of work. They have received positive feedback.
    Unclear: The information you received had no mention of this person involvment in their job.
Q18B: # Participation & Performance - Studying
  question: |
    Rate this person's participation, involvment and performance in their studies.
    Negative: They have an active dislike of school, assignments are not complete and they have failing grades.
    Inconsistent: They dislike or are disinterested, miss homework assignments and receive below average grades. Attendance is inconsistant.
    Rewarding: They rather enjoy school activites, regularly attend classes and do assignments, but have some difficulty understanding course material. Middling grades.
    Positive: They maintain a high interest in school work and school-related activities. Assignments are completed promptly and reliably. Rarely misses class. Average to above average grades.
    Unclear: The information you received had no mention of this person involvment in their school.
