    Negative: They have an active dislike of school and their job, assignments are not complete and they have failing grades, they get negative feedback on a regular basis at work.
    Inconsistent: They dislike or are disinterested in school and work, miss homework assignments and receive below average grades, They dislike their job, and perform at less than adequate level, they receive verbal reward on a very inconsistent basis. Attendance is inconsistant.
    Rewarding: They rather enjoy school activites, regularly attend classes and do assignments, but have some difficulty understanding course material. Middling grades. or They display some interest in their job, they may desire a different type of job. Performance is adequate, but they receive little appreciation.
    Positive: They maintain a high interest in school work and school-related activities. Assignments are completed promptly and reliably. Rarely misses class. Average to above average grades. OR : hey express a strong interest in their job, pride in their abilities/performance. They want to stay in the same line of work. They have received positive feedback.
    Unclear: The information you received had no mention of this person involvment in their school.
Q18D: # Participation & Performance - Rest
  question: |
    Rate this person's participation, involvment and performance in their daily activites.
    Negative: They hate their current occupation, or get negative feedback on a regular basis.
    Inconsistent: They dislike their current occupation, and perform at less than adequate level, they receive verbal reward on a very inconsistent basis.
    Rewarding: They display some interest in their current occupation, they may desire a different type of job. Performance is adequate, but they receive little appreciation.
    Positive: They express a strong interest in their current occupation, pride in their abilities/performance. They have received positive feedback.
    Unclear: The information you received had no mention of this person's involvment in their current occupation.
Q19A: # Peer interaction - Student
  question: |
    Rate this person's relationship with co-workers. Co-worker here is any work relation on an equal footing to the person.
    Problematic: They have continuous problems with co-workers or are isolated from co-workers, or participate with anti-social activities with their co-workers.
    Nonconstructive: They dislike their co-workers and sometimes engage in arguments, but mostly lets their feeling build up without adressing the underlying issues.
    Respectful: They like their co-workers, but they don't participate in activities with them that are unrelated to work. Co-workers provide a pro-social influence and network
    Positive: They get along with co-workers and spend time together on breaks and leisure activities. They help each other on the job, are friendly and cooperative.
    Unclear: The information you received had no mention of this person's relationships with co-workers.
Q19B:
  question: |
    Rate this person's relationship with fellow students.
    Problematic: They have a significant ongoing problem with peers, have virtually no contact with them or participare in anti-social behaviour with them.
    Nonconstructive: They dislike their peers and sometimes engage in arguments, but mostly lets their feeling build up without adressing the underlying issues.
    Respectful: They get along well with other students, but only infrequently associates with them for activities outside of school.
    Positive: They get along with fellow students, engage in outside activities with them, have close friends at school.
    Unclear: The information you received had no mention of this person's relationships with peers.
Q19C: # Peer interaction - Student
  question: |
    Rate this person's relationship with co-workers and fellow students. Co-worker here is any work relation on an equal footing to the person.
    Problematic: They have continuous problems with co-workers and peers or are isolated from co-workers, or participate with anti-social activities with their co-workers and peers.
    Nonconstructive: They dislike their co-workers and peers and sometimes engage in arguments, but mostly lets their feeling build up without adressing the underlying issues.
    Respectful: They like their co-workers or fellow students, but they don't participate in activities with them that are unrelated to workor school. Co-workers or peers provide a pro-social influence and network
    Positive: They get along with co-workers or fellow students and spend time together on breaks and leisure activities. They help each other on the jobor in school, are friendly and cooperative.
    Unclear: The information you received had no mention of this person's relationships with co-workers nor peers.

Q20A: # Authority interactions - Employed
  question: |
    Rate this person's interactions with their supervisors. Supervisor in this context is any figure of authority in a work-related environment.
    Problematic: They experience significant and continuing conflicts with their supervisor. They are unwilling to carry out their job description and discuss orders or they are treated unfairly or their supervisor engages in anti-social behaviour.
    Nonconstructive: They dislike their supervisor, but avoid open conflicts. They exert passive resistance.
    Respectful: They respect their supervisor and can talk to them about work-related problems. They follow instructions willingly.
    Amicable: They show respect for their supervisor and communicate openly with them, about work-related or personal issues.
    Unclear: The information you received has no mention of this person's relationship to work-related supervision.
Q20B: # Authority interactions - Student
  question: |
    Rate this person's interactions with their teachers.
    Problematic: They actively dislike their teachers, they are disruptive in class, hecke or argue with teachers.
    Nonconstructive: They dislike their teachers and do not participate to class. They do not approache teachers with questions or problems outside of class.
    Respectful: They show respect for their teachers and talk to them about course-related materials.
    Amicable: They talk to teacher(s) in and out of class. They have or would seek the opinion of a teacher regarding a personal/interpersonal problem or accomplishment. Respects teacher(s) and values opinion.
    Unclear: The information you received has no mention of this person's relationship to teachers.

Q20C: # Authority interactions - Student and Employed
  question: |
    Rate this person's interactions with their supervisors or teachers. Supervisor in this context is any figure of authority in a work-related environment.
    Problematic: They experience significant and continuing conflicts with their supervisor. They actively dislike their teachers, they are disruptive in class, hecke or argue with teachers.
    Nonconstructive: They dislike their supervisor, but avoid open conflicts. They exert passive resistance. They dislike their teachers and do not participate to class. They do not approache teachers with questions or problems outside of class.
    Respectful: They respect their supervisor and can talk to them about work-related problems. They follow instructions willingly. They show respect for their teachers and talk to them about course-related materials.
    Amicable: They show respect for their supervisor and communicate openly with them, about work-related or personal issues. They talk to teacher(s) in and out of class. They have or would seek the opinion of a teacher regarding a personal/interpersonal problem or accomplishment. Respects teacher(s) and values opinion.
    Unclear: The information you received has no mention of this person's relationship to work-related supervision or teachers
