Q230: # Preliminary to Q23 - relationship status
  question: |
    What is the relationship status of this person, in the past year ?
    Partnered: long term relationship of any form: married, co-habitating romatic relationship, whatever the sexual orientation.
    Short-term: newly formed relationship or dating
    Single: no significant relationship
    Unlear: you do not have any information about this person's romantic relationships in the past year.
Q23A: # Relationship Quality - partnered
  question: |
    How would you rate this person's relationship satisfaction or contentment with their romantic relationships in the past year?
    Negative: A significant risk, hostile/abusive relationship, harassing partner/ex-partner
    Poor: Significant conflicts, verbal abuse or disrespect, limited positive support
    Stable: Generally rewarding relationship, handles conflicts reasonably
    Strong: Highly satisfying relationship
    Unclear: The person did not provide any sentment todard their current relationship.
  type: "score_box"
  possible_answers: ["Negative", "Poor", "Stable", "Strong", "Unclear"]
Q23B: # Relationship Quality - short-term & single
  question: |
    How would you rate this person's relationship satisfaction or contentment with their romantic relationships in the past year?
    Negative: A significant risk, hostile/abusive relationship, harassing partner/ex-partner, an unhealthy breackup...
    Poor: A negative experience, significant conflicts, verbal abuse or disrespect, limited positive support in relationship is weighing on them
    Stable: They are generally content with their relationship status. If they are in a relationship they handle conflicts reasonably. If they are single they do not suffer from it. Highly satisfying relationship.
    Strong: Fully satisfied with their past year relationship history.
    Unclear: Not enough information provided to give a definitive answer from the conversation material.
  type: "score_box"
  possible_answers: ["Negative", "Poor", "Stable", "Strong", "Unclear"]
Q24: # Parental Relationship
  question: |
    How would you rate this person's relationship with their parental figures over the last year ?
    Assess based the parent they have the most contact with today. Parent here is someone who paricipated in raising them: step parents, grandparents count as well.
    Consider emotional connection, communication, and frequency of contact.
    Severe: Relationship is hostile or absent, shows complete disregard for parents' feelings/expectations, or parents are deceased
    Poor: Frequent conflicts and arguments, shows dissatisfaction or indifference toward relationship with parents
    Stable: Generally positive relationship with regular contact, parents show care and attempt positive influence
    Strong: Highly satisfying relationship with clear affection, regular contact, and positive parental influence
    Unclear: Not enough information provided to assess parental relationship
  type: "score_box"
  possible_answers: ["Negative", "Poor", "Stable", "Strong", "Unclear"]
Q25: # Extended Family Relationships
  question: |
    How would you rate this person's relationships with extended family over the past year? Consider siblings, aunts, uncles, cousins, grandparents, in-laws, foster family, or blended family members. Do not include children or parents.
    Severe: Relationships are absent, hostile, or completely uncaring with extended family
    Poor: Significant conflicts with family members, little to no positive influence from extended family
    Stable: Generally positive relationships, gets along with most relatives, family provides positive influence
    Strong: Highly satisfying relationships with regular contact, family clearly provides pro-social influence
    Unclear: Not enough information provided to assess extended family relationships
  type: "score_box"
  possible_answers: ["Negative", "Poor", "Stable", "Strong", "Unclear"]
Q26: # Criminal family / spouse
  question: |
    Yes: if an offender’s parent, sibling, current spouse/equivalent, or other close relative has a criminal record, or an established pattern of criminal behavior.
    No: the person's close family do not have a criminal record
    Unclear: The person did not say whether someone in their close family had a criminal record.
  type: "yes/no"
