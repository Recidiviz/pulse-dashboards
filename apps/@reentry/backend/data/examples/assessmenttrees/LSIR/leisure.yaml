Q30:
  question: |
    Has this person lacked consistent participation in formal community activities over the past 12 months? Consider sports teams, service clubs, churches, social support groups, and self-help groups.
    Yes: No established pattern of community involvement OR
    Attends mandatory self-help groups without active participation/social rewards
    No: Consistent involvement in community activities OR
    Active participation in self-help groups with social engagement/rewards (even if mandatory)
    Unclear: Not enough information
  type: "yes/no"
Q31:
  question: |
    How does the person spend their leisure time?
    Consider the nature, variety and consistency of recreational activities, as well as whether these activities are constructive or risky.
    Severe: No leisure activities, reports boredom, or engages in risky/criminal activities during free time
    Poor: Sporadic engagement in activities, mostly passive entertainment, or activities involve risky situations/people
    Stable: Participates in a few different activities, though involvement may be inconsistent or not fully satisfying
    Strong: Regular involvement in rewarding, constructive activities
    Unclear: Not enough information to assess leisure activities
  type: "score_box"
  possible_answers: ["Severe", "Poor", "Stable", "Strong", "Unclear"]
