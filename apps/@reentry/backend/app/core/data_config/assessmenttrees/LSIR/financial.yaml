tree:
  input_documents: "intake_conversation"
Q21: # Financial Stability
  question: |
    Rate this person's financial stability and management of their income/expenses over the last year.
    Severe: Cannot meet needs with legal income. Behind on most bills, severe financial stress. Shows impulsive spending or complete disregard. May have wages garnished
    Moderate: Struggles to meet needs with legal income. Shows frequent financial worry. Poor financial planning. May have wages garnished
    Stable: Meets needs through legal income. Manages debts adequately. Has basic money management skills. Some manageable financial stress
    Strong: Consistently meets all needs through legal income. Effective long-term financial management. No significant money concerns
    Unclear: Not enough information to assess financial situation
  type: "score_box"
  possible_answers: [Severe, Moderate, Stable, Strong, Unclear]
Q22: # Social Assistance Status
  question: |
    Has this person received or established a pattern of receiving social assistance in the past year? consider Government aid (AFDC, food stamps, unemployment) Disability income Housing assistance Recognized charities/churches. Financial help from relatives is not considered social assistance
    Yes: Currently receives assistance Pattern of receiving assistance in past year
    No: No social assistance received
    Unclear: Not enough information provided
  type: "yes/no"
